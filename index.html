<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciudad de la Furia – Cartografía de Identidades</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#3cb884;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  font-family:'Nunito',sans-serif;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.07) 1px,transparent 1px);
  background-size:24px 24px;
  pointer-events:none;z-index:0;
}
.page{
  position:relative;z-index:1;
  width:100%;max-width:700px;
  padding:24px 16px 32px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.eyebrow{
  font-size:10px;font-weight:800;letter-spacing:5px;
  text-transform:uppercase;color:rgba(255,255,255,.55);
}
.poster-title{
  font-family:'Fredoka One',cursive;font-size:clamp(20px,3.5vw,30px);
  color:#fff;letter-spacing:2px;text-shadow:1px 2px 0 rgba(0,0,0,.12);
  text-align:center;line-height:1;
}
.poster-title em{color:#ffe14d;font-style:normal}

/* ── MAP ── */
.map-container{width:100%;max-width:560px;position:relative}
.map-svg{width:100%;height:auto;display:block;overflow:visible}

/* ── RELATION LINES ── */
.rel-line{
  fill:none;
  stroke-linecap:round;
  opacity:0;
  transition:opacity .4s ease;
  pointer-events:visibleStroke;
  cursor:pointer;
}
.rel-line.show{opacity:1}
.rel-line.alianza   {stroke:#6ef07a;stroke-width:2.5}
.rel-line.tension   {stroke:#ff7070;stroke-width:2.5}
.rel-line.disputa   {stroke:#ffe050;stroke-width:2.5}
.rel-line.conv      {stroke:#70d8ff;stroke-width:2.5}

/* animated dash */
@keyframes flowLine{to{stroke-dashoffset:-60}}
.rel-line.show{animation:flowLine 1.8s linear infinite}

.rel-line.alianza.show {stroke-dasharray:14 8}
.rel-line.tension.show {stroke-dasharray:6 8}
.rel-line.disputa.show {stroke-dasharray:10 6}
.rel-line.conv.show    {stroke-dasharray:18 6}

/* glow on hover */
.rel-line:hover{stroke-width:5;filter:drop-shadow(0 0 5px currentColor)}

/* ── ACTOR ICONS ── */
.actor{cursor:pointer}
.actor .bubble{
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  transform-box:fill-box;transform-origin:center;
}
.actor:hover .bubble{transform:scale(1.28)}
.actor.lit .bubble{filter:drop-shadow(0 0 8px #fff)}
.actor.dim .bubble{opacity:.25}
.actor.dim text{opacity:.25}

@keyframes popIn{
  0%{opacity:0;transform:scale(0) translateY(8px)}
  70%{transform:scale(1.1) translateY(-2px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.actor{opacity:0;animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both}

/* ── TOOLTIP ── */
.tip{
  position:fixed;z-index:9999;
  pointer-events:none;
  opacity:0;transform:translateX(-50%) translateY(-8px) scale(.9);
  transition:opacity .15s,transform .15s;
  max-width:230px;min-width:185px;
}
.tip.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.tip-box{
  background:#0d1f0d;border-radius:14px;
  padding:12px 14px 10px;
  box-shadow:0 10px 30px rgba(0,0,0,.55);position:relative;
}
.tip-box::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;border-top-color:#0d1f0d;
}
.tip-emoji{font-size:24px;line-height:1;display:block;margin-bottom:4px}
.tip-group{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.tip-name{font-family:'Fredoka One',cursive;font-size:16px;color:#fff;margin-bottom:4px;line-height:1.1}
.tip-desc{font-size:11px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:6px}
.tip-tags{display:flex;flex-wrap:wrap;gap:3px}
.tip-tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:20px;border:1px solid;text-transform:uppercase}

/* ── LINE TOOLTIP ── */
.line-tip{
  position:fixed;z-index:9999;
  pointer-events:none;opacity:0;
  transform:translateX(-50%) translateY(-8px) scale(.9);
  transition:opacity .15s,transform .15s;
  min-width:170px;
}
.line-tip.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.line-tip-box{
  background:#0d1f0d;border-radius:10px;
  padding:8px 12px 7px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);position:relative;
}
.line-tip-box::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#0d1f0d;
}
.lt-type{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.lt-actors{font-family:'Fredoka One',cursive;font-size:13px;color:#fff;line-height:1.2;margin-bottom:3px}
.lt-desc{font-size:10px;color:rgba(255,255,255,.6);line-height:1.4}

/* ── LEGEND ── */
.legend{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  padding:8px 14px;background:rgba(0,0,0,.18);
  border-radius:50px;font-size:10px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;color:#fff;
}
.leg-item{display:flex;align-items:center;gap:5px;cursor:pointer;opacity:.7;transition:opacity .2s}
.leg-item:hover,.leg-item.active{opacity:1}
.leg-dot{width:18px;height:3px;border-radius:2px}
.leg-dot.alianza{background:#6ef07a}
.leg-dot.tension{background:#ff7070}
.leg-dot.disputa{background:#ffe050}
.leg-dot.conv   {background:#70d8ff}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{
  background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);
  font-family:'Fredoka One',cursive;font-size:13px;letter-spacing:1px;
  padding:8px 18px;border-radius:50px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:7px;
}
.ctrl-btn:hover{background:rgba(255,255,255,.25)}
.ctrl-btn.on{background:#ffe14d;color:#1a2e10;border-color:#ffe14d;box-shadow:0 3px 0 #c8a800}

/* ── RELATIONS PANEL ── */
.rel-panel{
  display:none;background:#0d1f0d;border-radius:16px;
  padding:14px 14px 10px;width:100%;max-width:560px;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
.rel-panel.on{display:block;animation:slideUp .3s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rp-title{font-family:'Fredoka One',cursive;font-size:14px;color:#ffe14d;text-align:center;margin-bottom:10px}
.rp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.rp-card{
  background:rgba(255,255,255,.05);border-radius:9px;padding:8px 9px;
  border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:background .2s;
}
.rp-card:hover{background:rgba(255,255,255,.1)}
.rp-actors{font-family:'Fredoka One',cursive;font-size:11px;color:#fff;line-height:1.3;margin-bottom:3px}
.rp-type{display:inline-block;font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:1px 6px;border-radius:4px;margin-bottom:4px}
.t-al{background:rgba(80,220,100,.2);color:#7af08a}
.t-te{background:rgba(255,90,90,.2);color:#ff9090}
.t-di{background:rgba(255,200,50,.2);color:#ffe070}
.t-co{background:rgba(80,180,255,.2);color:#90d8ff}
.rp-desc{font-size:9.5px;color:rgba(255,255,255,.5);line-height:1.4}

.footer{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.28);font-weight:700}
</style>
</head>
<body>
<div class="page">

      <g class="actor" id="ac-ant" style="animation-delay:.88s"

        <line x1="9" y1="10.5" x2="15" y2="7.5"/><line x1="9" y1="13.5" x2="15" y2="16.5"/>

<!-- ACTOR TOOLTIP -->
<div class="tip" id="tip">
  <div class="tip-box">
    <span class="tip-emoji" id="tipE"></span>
    <div class="tip-group">Actor Social · Ciudad de la Furia</div>
    <div class="tip-name" id="tipN"></div>
    <div class="tip-desc" id="tipD"></div>
    <div class="tip-tags" id="tipT"></div>
  </div>
</div>

<!-- LINE TOOLTIP -->
<div class="line-tip" id="lineTip">
  <div class="line-tip-box">
    <div class="lt-type" id="ltType"></div>
    <div class="lt-actors" id="ltActors"></div>
    <div class="lt-desc" id="ltDesc"></div>
  </div>
</div>

<script>
// ── DATA ──
const relations = [
  {id:'rl-amb-cic', type:'alianza', a:'🌿 Ambientalistas', b:'🚲 Ciclistas', desc:'Frente común por movilidad sostenible y defensa del espacio verde urbano.'},
  {id:'rl-amb-ani', type:'alianza', a:'🌿 Ambientalistas', b:'🐾 Animalistas', desc:'Coalición por bienestar animal y protección de ecosistemas urbanos.'},
  {id:'rl-ant-ani', type:'alianza', a:'🚫 Antitaurinos', b:'🐾 Animalistas', desc:'Frente jurídico unificado contra el maltrato animal institucionalizado.'},
  {id:'rl-fem-lgbt',type:'alianza', a:'✊ Feministas', b:'🏳️‍🌈 LGBTQ+', desc:'Agendas articuladas de derechos, visibilidad y seguridad urbana.'},
  {id:'rl-lid-ven', type:'alianza', a:'🏘️ Líderes', b:'🛒 Vendedores', desc:'Los líderes defienden a vendedores frente a operativos de desalojo.'},
  {id:'rl-bar-amb', type:'tension', a:'⚽ Barras', b:'🌿 Ambientalistas', desc:'Concentraciones pre-partido dañan zonas verdes y espacios compartidos.'},
  {id:'rl-bar-lid', type:'tension', a:'⚽ Barras', b:'🏘️ Líderes', desc:'Las barras controlan simbólicamente barrios que los líderes organizan.'},
  {id:'rl-fem-sal', type:'tension', a:'✊ Feministas', b:'💃 Salseros', desc:'Debate sobre hipersexualización en la cultura salsera y roles de género.'},
  {id:'rl-ven-ska', type:'disputa', a:'🛒 Vendedores', b:'🛹 Skaters', desc:'Compiten por el mismo espacio: andenes, plazas, centros a cielo abierto.'},
  {id:'rl-tea-ska', type:'disputa', a:'🎭 Teatreros', b:'🛹 Skaters', desc:'Compiten por plazas públicas como espacio de actuación y práctica.'},
  {id:'rl-sal-tea', type:'conv',    a:'💃 Salseros', b:'🎭 Teatreros', desc:'Disputan juntos plazas y parques como escenarios culturales vivos.'},
  {id:'rl-ska-gra', type:'conv',    a:'🛹 Skaters', b:'🎨 Grafiteros', desc:'Cultura urbana compartida: espacios, lenguajes y represión policial.'},
  {id:'rl-rap-gra', type:'conv',    a:'🎤 Raperos', b:'🎨 Grafiteros', desc:'Pilares del Hip-Hop local. Narran la ciudad desde los barrios.'},
  {id:'rl-amb-cic2',type:'conv',    a:'🏳️‍🌈 LGBTQ+', b:'💃 Salseros', desc:'El Orgullo y la cultura salsera confluyen en la apropiación festiva de la ciudad.'},
];

const typeLabel = {alianza:'Alianza',tension:'Tensión',disputa:'Disputa',conv:'Convergencia'};
const typeColor = {alianza:'#6ef07a',tension:'#ff7070',disputa:'#ffe050',conv:'#70d8ff'};
const typeClass = {alianza:'t-al',tension:'t-te',disputa:'t-di',conv:'t-co'};

// Build panel cards
const grid = document.getElementById('rpGrid');
relations.forEach(r => {
  const c = document.createElement('div');
  c.className = 'rp-card';
  c.innerHTML = `<div class="rp-actors">${r.a} ↔ ${r.b}</div><span class="rp-type ${typeClass[r.type]}">${typeLabel[r.type]}</span><div class="rp-desc">${r.desc}</div>`;
  c.addEventListener('mouseenter', () => { highlightLine(r.id); });
  c.addEventListener('mouseleave', () => { if (allOn) showAllLines(); else hideAllLines(); });
  grid.appendChild(c);
});

// ── STATE ──
let allOn = false;
let activeFilter = null;

// ── TOGGLE ALL LINES ──
function toggleAll() {
  allOn = !allOn;
  document.getElementById('btnAll').classList.toggle('on', allOn);
  document.getElementById('btnAll').textContent = allOn ? '✕ Ocultar relaciones' : '  Mostrar todas las relaciones';
  if (allOn) showAllLines(); else hideAllLines();
}

function showAllLines() {
  document.querySelectorAll('.rel-line').forEach(l => {
    if (!activeFilter || l.classList.contains(activeFilter)) l.classList.add('show');
    else l.classList.remove('show');
  });
}
function hideAllLines() {
  document.querySelectorAll('.rel-line').forEach(l => l.classList.remove('show'));
}
function highlightLine(id) {
  document.querySelectorAll('.rel-line').forEach(l => l.classList.remove('show'));
  const el = document.getElementById(id);
  if (el) el.classList.add('show');
}

// ── FILTER BY TYPE ──
function filterType(type, btn) {
  const items = document.querySelectorAll('.leg-item');
  if (activeFilter === type) {
    activeFilter = null;
    items.forEach(i => i.classList.remove('active'));
    if (allOn) showAllLines(); else hideAllLines();
    return;
  }
  activeFilter = type;
  items.forEach(i => i.classList.toggle('active', i.dataset.type === type));
  if (allOn) showAllLines();
  else {
    document.querySelectorAll('.rel-line').forEach(l => {
      l.classList.toggle('show', l.classList.contains(type));
    });
  }
}

// ── TOGGLE PANEL ──
function togglePanel() {
  const p = document.getElementById('relPanel');
  const b = document.getElementById('btnPanel');
  const on = p.classList.toggle('on');
  b.classList.toggle('on', on);
}

// ── ACTOR TOOLTIP ──
const tip  = document.getElementById('tip');
const tipE = document.getElementById('tipE');
const tipN = document.getElementById('tipN');
const tipD = document.getElementById('tipD');
const tipT = document.getElementById('tipT');

document.querySelectorAll('.actor').forEach(el => {
  el.addEventListener('mouseenter', e => showActorTip(el, e));
  el.addEventListener('mousemove',  e => moveTip(tip, e));
  el.addEventListener('mouseleave', () => tip.classList.remove('on'));
});

function showActorTip(el, e) {
  const d = el.dataset;
  tipE.textContent = d.emoji || '';
  tipN.textContent = d.name  || '';
  tipN.style.color = d.color || '#fff';
  tipD.textContent = d.desc  || '';
  tipT.innerHTML = '';
  [d.t1,d.t2,d.t3].filter(Boolean).forEach(t => {
    const s = document.createElement('span');
    s.className = 'tip-tag';
    s.textContent = t;
    s.style.color = d.color||'#fff';
    s.style.borderColor = d.color||'#fff';
    tipT.appendChild(s);
  });
  moveTip(tip, e);
  tip.classList.add('on');
}

// ── LINE TOOLTIP ──
const lineTip  = document.getElementById('lineTip');
const ltType   = document.getElementById('ltType');
const ltActors = document.getElementById('ltActors');
const ltDesc   = document.getElementById('ltDesc');

document.querySelectorAll('.rel-line').forEach(line => {
  line.addEventListener('mouseenter', e => {
    const d = line.dataset;
    const type = d.type || 'alianza';
    ltType.textContent  = typeLabel[type] || type;
    ltType.style.color  = typeColor[type] || '#fff';
    ltActors.textContent = `${d.a} ↔ ${d.b}`;
    ltDesc.textContent   = d.desc || '';
    moveTip(lineTip, e);
    lineTip.classList.add('on');
  });
  line.addEventListener('mousemove', e => moveTip(lineTip, e));
  line.addEventListener('mouseleave', () => lineTip.classList.remove('on'));
});

function moveTip(el, e) {
  el.style.left = (e.clientX) + 'px';
  el.style.top  = (e.clientY - 16) + 'px';
}

// ── AUTO-ANIMATE: cycle through relation types every 3s ──
const types = ['alianza','tension','disputa','conv'];
let cycleIdx = 0;
let cycleTimer = null;

function startCycle() {
  cycleTimer = setInterval(() => {
    if (allOn) return;
    const type = types[cycleIdx % types.length];
    document.querySelectorAll('.rel-line').forEach(l => {
      l.classList.toggle('show', l.classList.contains(type));
    });
    // update legend highlight
    document.querySelectorAll('.leg-item').forEach(i =>
      i.classList.toggle('active', i.dataset.type === type));
    cycleIdx++;
  }, 2800);
}

// Start cycle after actors pop in
setTimeout(() => {
  // show first batch immediately
  document.querySelectorAll('.rel-line.alianza').forEach(l => l.classList.add('show'));
  document.querySelectorAll('.leg-item[data-type="alianza"]').forEach(i => i.classList.add('active'));
  cycleIdx = 1;
  startCycle();
}, 1600);

// Pause cycle when user takes control
document.getElementById('btnAll').addEventListener('click', () => {
  clearInterval(cycleTimer);
  document.querySelectorAll('.leg-item').forEach(i => i.classList.remove('active'));
});
document.querySelectorAll('.leg-item').forEach(item => {
  item.addEventListener('click', () => { clearInterval(cycleTimer); });
});
</script>
